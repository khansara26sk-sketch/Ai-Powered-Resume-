<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Resume Feedback</title>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>AI Resume Feedback</h1>
    <p>Get AI-powered feedback and an improved resume instantly</p>

    <!-- Resume Text -->
    <label>Paste Your Resume</label>
    <textarea id="resumeText" placeholder="Paste your resume text here..."></textarea>

    <p class="helper-text">OR upload a resume file</p>

    <!-- Upload Resume File -->
    <label>Upload Resume (Image or PDF)</label>
    <div class="upload-box">
      <input type="file" id="resumeImage" accept=".jpg,.jpeg,.png,.pdf" hidden>
      <label for="resumeImage" class="upload-label">
        📄 Click to upload resume
        <span>JPG, PNG or PDF</span>
      </label>
    </div>

    <!-- File Preview Name -->
    <p id="fileName" class="file-name hidden"></p>

    <!-- Image Preview -->
    <div id="imagePreview" class="image-preview hidden">
      <img id="previewImg" alt="Resume Preview">
    </div>

    <!-- Job Role -->
    <label>Target Job Role</label>
    <input type="text" id="jobRole" placeholder="e.g. Frontend Developer">

    <!-- Experience -->
    <label>Experience Level</label>
    <select id="experience">
      <option>Fresher</option>
      <option>1–3 Years</option>
      <option>3+ Years</option>
    </select>

    <!-- Analyze Button -->
    <button id="analyzeBtn">Analyze & Improve Resume</button>

    <!-- Status -->
    <p id="statusMessage" class="status-message"></p>

    <!-- Output Section -->
    <div id="output" class="hidden">
      <h2>AI Feedback</h2>

      <p><strong>ATS Score:</strong> <span id="score"></span></p>
      <p><strong>Missing Skills:</strong> <span id="skills"></span></p>

      <p><strong>Suggestions:</strong></p>
      <ul id="suggestions"></ul>

      <hr class="divider">

      <h3>AI-Improved Resume</h3>

      <!-- Improved Resume Text -->
      <div id="improvedResume" class="improved-resume"></div>

      <!-- ✅ DOWNLOAD BUTTON (OUTSIDE improvedResume) -->
      <button id="downloadBtn" class="download-btn hidden">
        📥 Download Improved Resume
      </button>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
